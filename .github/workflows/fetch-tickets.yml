name: Fetch Desk365 Tickets

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8am UTC
  workflow_dispatch:        # Allow manual trigger via GitHub button

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tickets from Desk365 API
        env:
          DESK365_API_KEY: ${{ secrets.DESK365_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, time, os
          from datetime import datetime, timezone

          API_KEY = os.environ["DESK365_API_KEY"]
          BASE = "https://gulfcoast.desk365.io/apis/v3/tickets"

          def fetch(url):
              req = urllib.request.Request(url, headers={"Authorization": API_KEY})
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          first = fetch(f"{BASE}?per_page=100&page=1")
          total = first["count"]
          pages = min((total // 100) + (1 if total % 100 else 0), 70)
          tickets = list(first["tickets"])
          print(f"Total: {total}, Pages: {pages}")

          for p in range(2, pages + 1):
              time.sleep(0.5)
              d = fetch(f"{BASE}?per_page=100&page={p}")
              tickets.extend(d["tickets"])
              if p % 10 == 0:
                  print(f"  Page {p}/{pages} — {len(tickets)} tickets")

          output = {
              "fetched_at": datetime.now(timezone.utc).strftime("%b %d, %Y %H:%M UTC"),
              "total_in_system": total,
              "count": len(tickets),
              "tickets": tickets
          }
          with open("data.json", "w") as f:
              json.dump(output, f)
          print(f"Done — {len(tickets)} tickets saved")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update: Desk365 ticket data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
