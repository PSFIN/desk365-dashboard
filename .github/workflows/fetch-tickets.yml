name: Fetch Desk365 Tickets

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tickets from Desk365 API
        env:
          DESK365_API_KEY: ${{ secrets.DESK365_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.error, json, time, os
          from datetime import datetime, timezone
          from collections import Counter

          API_KEY = os.environ["DESK365_API_KEY"]
          BASE = "https://gulfcoast.desk365.io/apis"

          def fetch(url):
              req = urllib.request.Request(url, headers={"Authorization": API_KEY})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read())

          # Get latest ticket number
          latest = fetch(f"{BASE}/v3/tickets?per_page=1")
          max_ticket = latest["tickets"][0]["ticket_number"]
          total_in_system = latest["count"]
          print(f"Latest ticket: #{max_ticket}, Total: {total_in_system}")

          # Fetch last 500 tickets individually
          FETCH_LAST = 500
          tickets = []
          end = max(1, max_ticket - FETCH_LAST + 1)

          for num in range(max_ticket, end - 1, -1):
              try:
                  d = fetch(f"{BASE}/v3/tickets/details?ticket_number={num}")
                  tickets.append(d)
                  if len(tickets) % 50 == 0:
                      print(f"  {len(tickets)} tickets fetched (#{num})")
                  time.sleep(0.4)
              except urllib.error.HTTPError as e:
                  if e.code == 429:
                      print(f"  Rate limited at #{num}, waiting 20s...")
                      time.sleep(20)
                      try:
                          d = fetch(f"{BASE}/v3/tickets/details?ticket_number={num}")
                          tickets.append(d)
                      except: pass
                  elif e.code != 404:
                      print(f"  Error #{num}: {e.code}")

          statuses = Counter(t["status"] for t in tickets)
          print(f"\nDone: {len(tickets)} tickets — {dict(statuses)}")

          output = {
              "fetched_at": datetime.now(timezone.utc).strftime("%b %d, %Y %H:%M UTC"),
              "total_in_system": total_in_system,
              "count": len(tickets),
              "tickets": tickets
          }
          with open("data.json", "w") as f:
              json.dump(output, f)
          print("Saved to data.json")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update: Desk365 ticket data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
